<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=overlays-content"
    />
    <meta
      name="description"
      content="《一粒米的一生》移动端 H5 互动公益广告，讲述从田间到餐桌的惜粮旅程。"
    />
    <meta name="theme-color" content="#08251f" />
    <link rel="preload" as="image" href="./images/home-rice.webp" type="image/webp" />
    <link
      rel="preload"
      as="image"
      href="./images/cutouts/home-rice-universe.webp"
      type="image/webp"
    />
    <title>一粒米的一生</title>
    <script>
      (function () {
        var lastWidth = 0;
        var lastHeight = 0;
        var frameId = 0;

        function applyViewportSize(force) {
          window.cancelAnimationFrame(frameId);
          frameId = window.requestAnimationFrame(function () {
            var viewport = window.visualViewport;
            var width = Math.round(window.innerWidth || (viewport && viewport.width) || 0);
            var height = Math.round(window.innerHeight || (viewport && viewport.height) || 0);
            var isRealResize =
              Math.abs(width - lastWidth) > 8 ||
              Math.abs(height - lastHeight) > 140;

            if (force || !lastHeight || isRealResize) {
              document.documentElement.style.setProperty("--app-height", height + "px");
              document.documentElement.style.setProperty("--app-width", width + "px");
              lastWidth = width;
              lastHeight = height;
            }
          });
        }

        applyViewportSize(true);
        window.addEventListener("resize", function () {
          applyViewportSize(false);
        });
        window.addEventListener("orientationchange", function () {
          applyViewportSize(true);
          window.setTimeout(function () {
            applyViewportSize(true);
          }, 320);
        });
        window.visualViewport &&
          window.visualViewport.addEventListener("resize", function () {
            applyViewportSize(false);
          });
      })();
    </script>
    <style>
      html,
      body {
        width: 100%;
        height: max(var(--app-height, 100vh), 100vh);
        min-height: 0;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: fixed;
        inset: 0;
        background: #08251f;
        overscroll-behavior: none;
      }

      .boot-screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: rgba(255, 249, 236, 0.82);
        background:
          radial-gradient(circle at 50% 18%, rgba(211, 161, 59, 0.22), transparent 34%),
          linear-gradient(145deg, #08251f 0%, #12332e 52%, #102d34 100%);
        font-family:
          "Noto Serif SC", "Source Han Serif SC", "Songti SC", "Microsoft YaHei",
          serif;
      }

      .boot-screen span {
        position: relative;
        padding-top: 64px;
        font-size: 16px;
        letter-spacing: 0.12em;
      }

      .boot-screen span::before {
        position: absolute;
        top: 0;
        left: 50%;
        width: 24px;
        height: 42px;
        border-radius: 50%;
        background: linear-gradient(180deg, #fff6c9, #d3a13b);
        box-shadow: 0 0 32px rgba(211, 161, 59, 0.34);
        content: "";
        transform: translateX(-50%) rotate(18deg);
        animation: bootRice 1.8s ease-in-out infinite;
      }

      @keyframes bootRice {
        0%,
        100% {
          transform: translateX(-50%) translateY(0) rotate(18deg);
        }

        50% {
          transform: translateX(-50%) translateY(-9px) rotate(10deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen" aria-label="页面加载中">
        <span>一粒米正在醒来</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>请开启 JavaScript 后体验《一粒米的一生》H5。</noscript>
  </body>
</html>
