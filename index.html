<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=overlays-content"
    />
    <meta
      name="description"
      content="《一粒米的一生》移动端 H5 互动公益广告，讲述从田间到餐桌的惜粮旅程。"
    />
    <meta name="theme-color" content="#08251f" />
    <title>一粒米的一生</title>
    <script>
      (function () {
        var lastWidth = 0;
        var lastHeight = 0;
        var frameId = 0;

        function applyViewportSize(force) {
          window.cancelAnimationFrame(frameId);
          frameId = window.requestAnimationFrame(function () {
            var viewport = window.visualViewport;
            var width = Math.round(window.innerWidth || (viewport && viewport.width) || 0);
            var height = Math.round(window.innerHeight || (viewport && viewport.height) || 0);
            var isRealResize =
              Math.abs(width - lastWidth) > 8 ||
              Math.abs(height - lastHeight) > 140;

            if (force || !lastHeight || isRealResize) {
              document.documentElement.style.setProperty("--app-height", height + "px");
              document.documentElement.style.setProperty("--app-width", width + "px");
              lastWidth = width;
              lastHeight = height;
            }
          });
        }

        applyViewportSize(true);
        window.addEventListener("resize", function () {
          applyViewportSize(false);
        });
        window.addEventListener("orientationchange", function () {
          applyViewportSize(true);
          window.setTimeout(function () {
            applyViewportSize(true);
          }, 320);
        });
        window.visualViewport &&
          window.visualViewport.addEventListener("resize", function () {
            applyViewportSize(false);
          });
      })();
    </script>
    <script>
      (function () {
        var isGitHubPages = location.hostname.endsWith(".github.io");
        var isBuiltDocsPage = location.pathname.indexOf("/docs/") !== -1;

        if (isGitHubPages && !isBuiltDocsPage) {
          document.documentElement.classList.add("github-pages-host");
        }
      })();
    </script>
    <style>
      html,
      body {
        width: 100%;
        height: max(var(--app-height, 100vh), 100vh);
        min-height: 0;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: fixed;
        inset: 0;
        background: #08251f;
        overscroll-behavior: none;
      }

      .github-pages-shell {
        display: none;
      }

      .github-pages-host,
      .github-pages-host body {
        width: 100%;
        height: max(var(--app-height, 100vh), 100vh);
        overflow: hidden;
      }

      .github-pages-host #root {
        display: none;
      }

      .github-pages-host .github-pages-shell {
        position: fixed;
        inset: 0;
        width: 100%;
        height: max(var(--app-height, 100vh), 100vh);
        display: block;
        background:
          radial-gradient(circle at 50% -8%, rgba(211, 161, 59, 0.22), transparent 36%),
          linear-gradient(145deg, #08251f 0%, #12332e 48%, #102d34 100%);
      }

      .github-pages-shell iframe {
        width: 100%;
        height: max(var(--app-height, 100vh), 100vh);
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="github-pages-shell" aria-label="一粒米的一生 H5">
      <iframe
        src="./docs/"
        title="一粒米的一生"
        loading="eager"
        scrolling="no"
        allow="clipboard-write"
      ></iframe>
    </div>
    <script>
      (function () {
        if (document.documentElement.classList.contains("github-pages-host")) {
          return;
        }

        var script = document.createElement("script");
        script.type = "module";
        script.src = "/src/main.tsx";
        document.body.appendChild(script);
      })();
    </script>
    <noscript>请开启 JavaScript 后体验《一粒米的一生》H5。</noscript>
  </body>
</html>
